services:
  livox:
    build: .
    network_mode: host
    privileged: true
    ipc: host
    tty: true
    stdin_open: true
    volumes:
      - ./ros2_ws:/ros2_ws:rw
      - ./dev_ws:/dev_ws:rw  
      - ./connections:/connections:rw        
      - ./Livox-SDK2:/Livox-SDK2:rw 
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ./data:/data:rw    
    command: >
      bash -c "
      ip route del default dev end0 2>/dev/null || true &&
      source /opt/ros/humble/setup.bash &&
      cd /ros2_ws &&
      colcon build --symlink-install --cmake-args -DHUMBLE_ROS=humble &&
      source install/setup.bash &&
      cd /dev_ws &&
      colcon build &&
      source install/setup.bash &&
      ros2 daemon start &&
      ros2 launch livox_ros_driver2 rviz_MID360_launch.py 
      "
    environment:
      - LIVOX_LOG_LEVEL=DEBUG
      - RCL_LOG_LEVEL=DEBUG
      - ROS_DOMAIN_ID=1
      - ROS_LOCALHOST_ONLY=0
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - DATASET_DIR=/data
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///connections/cycloneDDS_profile.xml
